name: DataLink Python Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./datalink

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install -r tests/python/requirements.txt

      - name: Generate Python code for tests
        run: python gen.py --lang python --outdir tests/python

      - name: Run Python tests
        run: python -m pytest tests/python -q
